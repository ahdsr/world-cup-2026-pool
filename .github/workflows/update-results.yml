name: Update live results

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update results from ESPN
        run: node scripts/update-results.mjs

      - name: Run tests
        run: npm test

      - name: Commit updated results
        run: |
          if git diff --quiet -- data/results.json; then
            echo "No results changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git commit -m "Update live pool results"
          git push
